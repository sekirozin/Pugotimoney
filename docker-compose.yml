services:
  pugotimoney:
    build: .
    container_name: pugotimoney
    ports:
      - "3000:3000"
    volumes:
      - ./database.sqlite:/app/database.sqlite
      - ./Extratos:/app/Extratos
      - ./.env:/app/.env
      - ./server.log:/app/server.log
    environment:
      - NODE_ENV=production
      - PUGOTILAB_PROFILE_URL=http://pugotilab-auth:8080/auth/api/profile
    networks:
      - default
      - pugotilab
    restart: unless-stopped

networks:
  pugotilab:
    external: true
